      "shortBio": "落語の楽しさを自分の感じたままにお客様にお届けできるような噺家でありたいと考えます。寄席囃子の笛を演奏を得意としており、寄席だけでなく都内各ホール落語会や学校公演などでも生演奏のよさを伝えてゆきたいです。\nインターネットに関する知識理解を生かし、落語を広く知っていただけるように努めています。\nskype : sannosuke\ntwitter : @sannosuke\nfacebook : sannosuke\nmixi : 柳家 三之助\nなどなど、あらゆる手段でアクセスしていただけます。\n「うちのようなところでも落語会をやってもらえるのかしら」という想いにできる限り答えていけるような、その土地に落語が根付くような「いいペース」での小さな落語会を応援しています。",
      "publications": "ＣＤ：\n「時そば・まんじゅうこわい 親子できこう 子ども落語集 2」\n(日本コロムビア)\n子供向けの商品ですが、わたくし以外はみな昭和の名人ばかり。恐る恐る、大人のお客様にもおすすめしています。\n\n「決定版!寄席囃子100」(ソニーミュージック)\n寄席で毎日生演奏されている寄席のお囃子を121曲!収録しました。寄席の好きな方のBGMとしては贅沢なものです。\n\nＤＶＤ：\n「えほん寄席」(NHKエデュケーショナル)\nわたくしの落語に有名な画家さんによる楽しいアニメーションがついている、お子さん向けの楽しい映像です。\n\n書籍：\n「オールフライトニッポン」(風濤社刊)\n全く落語には関係ない旅客機の本。現役機長などとのトークラジオ風のおしゃべりがいっぱいです。\n\n「オールフライトニッポン2～ANAの女性たち」(風濤社刊)\n前作に引き続いての翼のプロとの対談集。今回はANAの女性にスポットを当てています。",
